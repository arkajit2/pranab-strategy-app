name: Keep Streamlit App Awake

on:
  schedule:
    # This runs every 10 hours
    - cron: '0 */10 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare empty commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "Keep-alive: Periodic activity to prevent hibernation"
          
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main # Change this to 'master' if your default branch is named master
